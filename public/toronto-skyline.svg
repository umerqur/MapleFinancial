<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1000" preserveAspectRatio="xMidYEnd slice" fill="none" role="img" aria-label="Vintage Toronto skyline silhouette featuring the CN Tower">
  <defs>
    <linearGradient id="skyFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B2F20" stop-opacity="0"/>
      <stop offset="55%" stop-color="#0B2F20" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0B2F20" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <g stroke="#0B2F20" stroke-width="1.1" stroke-linecap="square" stroke-linejoin="miter" fill="#0B2F20">

    <!-- Distant low rises (far left) -->
    <rect x="40"  y="760" width="90"  height="240"/>
    <rect x="140" y="720" width="70"  height="280"/>
    <rect x="220" y="780" width="110" height="220"/>
    <rect x="340" y="700" width="80"  height="300"/>
    <rect x="430" y="740" width="60"  height="260"/>
    <rect x="500" y="690" width="95"  height="310"/>

    <!-- First Canadian Place-like slab -->
    <rect x="610" y="470" width="150" height="530"/>
    <!-- Scotia Plaza notch -->
    <rect x="770" y="540" width="110" height="460"/>
    <rect x="790" y="520" width="70"  height="20"/>

    <!-- Commerce Court / TD Centre cluster -->
    <rect x="895" y="610" width="85"  height="390"/>
    <rect x="990" y="560" width="120" height="440"/>
    <rect x="1120" y="640" width="70" height="360"/>

    <!-- Royal Bank Plaza (twin slabs) -->
    <rect x="1200" y="580" width="90"  height="420"/>
    <rect x="1300" y="600" width="90"  height="400"/>

    <!-- BMO / mid-rise stack -->
    <rect x="1400" y="680" width="75"  height="320"/>
    <rect x="1485" y="720" width="60"  height="280"/>
    <rect x="1555" y="660" width="90"  height="340"/>

    <!-- CN Tower (centerpiece) -->
    <!-- Base shaft -->
    <polygon points="1720,1000 1738,560 1762,560 1780,1000"/>
    <!-- Shaft taper up to pod -->
    <polygon points="1738,560 1744,440 1756,440 1762,560"/>
    <!-- Main observation pod (SkyPod lower) -->
    <polygon points="1720,440 1780,440 1800,420 1800,400 1780,380 1720,380 1700,400 1700,420"/>
    <!-- Pod ring highlight -->
    <rect x="1700" y="405" width="100" height="6" fill="#0B2F20"/>
    <!-- Upper taper -->
    <polygon points="1744,380 1756,380 1754,300 1746,300"/>
    <!-- SkyPod -->
    <polygon points="1738,300 1762,300 1766,284 1762,270 1738,270 1734,284"/>
    <!-- Upper mast -->
    <rect x="1748" y="270" width="4" height="100"/>
    <polygon points="1749,170 1751,170 1750,110"/>
    <line x1="1750" y1="170" x2="1750" y2="90" stroke="#0B2F20" stroke-width="1.4"/>

    <!-- Rogers Centre dome to the left of CN Tower -->
    <path d="M 1560 900 Q 1660 780 1780 900 Z"/>
    <line x1="1560" y1="900" x2="1780" y2="900"/>

    <!-- L Tower / Ice Condos (east cluster) -->
    <rect x="1820" y="500" width="55"  height="500"/>
    <rect x="1885" y="560" width="75"  height="440"/>
    <rect x="1970" y="600" width="60"  height="400"/>
    <rect x="2040" y="540" width="95"  height="460"/>
    <rect x="2145" y="660" width="65"  height="340"/>
    <rect x="2220" y="700" width="80"  height="300"/>
    <rect x="2310" y="740" width="70"  height="260"/>

    <!-- Thin window ticks on major slabs for architectural texture -->
    <g stroke="#0B2F20" stroke-width="0.6" opacity="0.9">
      <line x1="625"  y1="520" x2="745" y2="520"/>
      <line x1="625"  y1="600" x2="745" y2="600"/>
      <line x1="625"  y1="680" x2="745" y2="680"/>
      <line x1="625"  y1="760" x2="745" y2="760"/>
      <line x1="625"  y1="840" x2="745" y2="840"/>
      <line x1="625"  y1="920" x2="745" y2="920"/>

      <line x1="1005" y1="610" x2="1105" y2="610"/>
      <line x1="1005" y1="700" x2="1105" y2="700"/>
      <line x1="1005" y1="790" x2="1105" y2="790"/>
      <line x1="1005" y1="880" x2="1105" y2="880"/>

      <line x1="1215" y1="640" x2="1285" y2="640"/>
      <line x1="1215" y1="740" x2="1285" y2="740"/>
      <line x1="1215" y1="840" x2="1285" y2="840"/>
      <line x1="1215" y1="940" x2="1285" y2="940"/>

      <line x1="1315" y1="660" x2="1385" y2="660"/>
      <line x1="1315" y1="760" x2="1385" y2="760"/>
      <line x1="1315" y1="860" x2="1385" y2="860"/>
      <line x1="1315" y1="960" x2="1385" y2="960"/>

      <line x1="1835" y1="560" x2="1870" y2="560"/>
      <line x1="1835" y1="660" x2="1870" y2="660"/>
      <line x1="1835" y1="760" x2="1870" y2="760"/>
      <line x1="1835" y1="860" x2="1870" y2="860"/>
      <line x1="1835" y1="960" x2="1870" y2="960"/>

      <line x1="2055" y1="600" x2="2130" y2="600"/>
      <line x1="2055" y1="700" x2="2130" y2="700"/>
      <line x1="2055" y1="800" x2="2130" y2="800"/>
      <line x1="2055" y1="900" x2="2130" y2="900"/>
    </g>
  </g>

  <!-- Subtle atmospheric fade so the skyline recedes into the cream page -->
  <rect x="0" y="0" width="2400" height="1000" fill="url(#skyFade)" opacity="0"/>
</svg>
